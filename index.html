    // ─────────────────────────────────────────────────────────────
    //  SEARCHABLE SELECT
    // ─────────────────────────────────────────────────────────────
    class SearchableSelect {
      constructor(inputId, dropdownId) {
        this.input      = document.getElementById(inputId);
        this.dropdown   = document.getElementById(dropdownId);
        this.value      = '';
        this.hlIndex    = -1;

        this.input.addEventListener('focus', () => this.open());
        this.input.addEventListener('input', () => { this.value = ''; this.renderList(); });
        this.input.addEventListener('keydown', e => this.onKey(e));
        document.addEventListener('click', e => {
          if (!this.input.closest('.searchable-select').contains(e.target)) this.close();
        });
      }

      open() {
        this.renderList();
        this.dropdown.classList.add('open');
      }

      close() {
        this.dropdown.classList.remove('open');
        this.input.value = this.value || '';
        this.hlIndex = -1;
      }

      renderList() {
        const q = this.input.value.toLowerCase().trim();
        this.dropdown.innerHTML = '';
        this.hlIndex = -1;

        const brands = {};
        Object.keys(miceData).forEach(model => {
          if (!q || model.toLowerCase().includes(q)) {
            const b = miceData[model].brand;
            if (!brands[b]) brands[b] = [];
            brands[b].push(model);
          }
        });

        const sortedBrands = Object.keys(brands).sort();
        if (sortedBrands.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'dropdown-empty';
          empty.textContent = 'No mouse found';
          this.dropdown.appendChild(empty);
          return;
        }

        sortedBrands.forEach(brand => {
          const grp = document.createElement('div');
          grp.className = 'dropdown-group';
          grp.textContent = brand;
          this.dropdown.appendChild(grp);

          brands[brand].forEach(model => {
            const item = document.createElement('div');
            item.className = 'dropdown-item';
            item.textContent = model;
            item.addEventListener('mousedown', e => { e.preventDefault(); this.select(model); });
            this.dropdown.appendChild(item);
          });
        });
      }

      select(model) {
        this.value = model;
        this.input.value = model;
        this.dropdown.classList.remove('open');
        this.hlIndex = -1;
      }

      onKey(e) {
        const items = [...this.dropdown.querySelectorAll('.dropdown-item')];
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          this.hlIndex = Math.min(this.hlIndex + 1, items.length - 1);
          this.updateHighlight(items);
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          this.hlIndex = Math.max(this.hlIndex - 1, 0);
          this.updateHighlight(items);
        } else if (e.key === 'Enter') {
          if (this.hlIndex >= 0 && items[this.hlIndex]) {
            this.select(items[this.hlIndex].textContent);
          }
        } else if (e.key === 'Escape') {
          this.close();
        }
      }

      updateHighlight(items) {
        items.forEach((el, i) => {
          el.classList.toggle('highlighted', i === this.hlIndex);
          if (i === this.hlIndex) el.scrollIntoView({ block: 'nearest' });
        });
      }

      getValue() { return this.value; }
    }

    // ─────────────────────────────────────────────────────────────
    //  INTERPOLATION
    // ─────────────────────────────────────────────────────────────
    function getRealDPI(measurements, setDPI) {
      const s = [...measurements].sort((a, b) => a.set - b.set);
      const exact = s.find(m => m.set === setDPI);
      if (exact) return exact.real;
      if (setDPI <= s[0].set) return setDPI * (s[0].real / s[0].set);
      if (setDPI >= s[s.length-1].set) return setDPI * (s[s.length-1].real / s[s.length-1].set);
      for (let i = 0; i < s.length - 1; i++) {
        if (setDPI >= s[i].set && setDPI <= s[i+1].set) {
          const t = (setDPI - s[i].set) / (s[i+1].set - s[i].set);
          return s[i].real + t * (s[i+1].real - s[i].real);
        }
      }
      return setDPI;
    }

    function getSetDPI(measurements, targetReal) {
      const s = [...measurements].sort((a, b) => a.real - b.real);
      if (targetReal <= s[0].real) return targetReal * (s[0].set / s[0].real);
      if (targetReal >= s[s.length-1].real) return targetReal * (s[s.length-1].set / s[s.length-1].real);
      for (let i = 0; i < s.length - 1; i++) {
        if (targetReal >= s[i].real && targetReal <= s[i+1].real) {
          const t = (targetReal - s[i].real) / (s[i+1].real - s[i].real);
          return s[i].set + t * (s[i+1].set - s[i].set);
        }
      }
      return targetReal;
    }

    // ─────────────────────────────────────────────────────────────
    //  CALCULATE
    // ─────────────────────────────────────────────────────────────
    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('visible');
    }

    function hideError() {
      document.getElementById('errorMsg').classList.remove('visible');
    }

    function calculate() {
      hideError();
      document.getElementById('resultWrap').classList.remove('visible');

      const fromModel = fromSelect.getValue();
      const fromDPI   = parseFloat(document.getElementById('fromDPI').value);
      const toModel   = toSelect.getValue();

      if (!fromModel)             return showError('Please select your current mouse.');
      if (!fromDPI || fromDPI<=0) return showError('Please enter a valid DPI value.');
      if (!toModel)               return showError('Please select your new mouse.');
      if (fromModel === toModel)  return showError('You selected the same mouse on both sides!');

      const realDPI     = getRealDPI(miceData[fromModel].measurements, fromDPI);
      const recommended = Math.round(getSetDPI(miceData[toModel].measurements, realDPI));

      document.getElementById('resultNumber').textContent = recommended.toLocaleString();
      document.getElementById('resultDetail').innerHTML =
        `Your <strong>${fromModel}</strong> at <strong>${fromDPI.toLocaleString()} DPI</strong> ` +
        `actually moves at <strong>~${Math.round(realDPI).toLocaleString()} real DPI</strong>. ` +
        `<span class="result-pill">Lego Measured</span><br><br>` +
        `To feel <strong>identical</strong> on your <strong>${toModel}</strong>, ` +
        `set it to <strong>${recommended.toLocaleString()} DPI</strong>.`;

      const wrap = document.getElementById('resultWrap');
      wrap.classList.add('visible');
      wrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // ─────────────────────────────────────────────────────────────
    //  INIT
    // ─────────────────────────────────────────────────────────────
    const fromSelect = new SearchableSelect('fromMouseInput', 'fromMouseDropdown');
    const toSelect   = new SearchableSelect('toMouseInput',   'toMouseDropdown');

    document.getElementById('fromDPI').addEventListener('keydown', e => {
      if (e.key === 'Enter') calculate();
    });
  </script>
